name: Cypress E2E Testing

on:
  workflow_run:
    workflows: ["Jest Unit Testing (API Routes & Server Actions)"]
    types:
      - completed
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-deps-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: pnpm install

  build:
    needs: install
    runs-on: ubuntu-latest
    environment: testing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Restore dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-deps-${{ hashFiles('pnpm-lock.yaml') }}
          fail-on-cache-miss: true

      - name: Build application
        run: pnpm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CYPRESS_USER_EMAIL: ${{ secrets.CYPRESS_USER_EMAIL }}
          CYPRESS_USER_PASSWORD: ${{ secrets.CYPRESS_USER_PASSWORD }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXT_PUBLIC_SKIP_IMAGE_VALIDATION: true
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}
          REDIS_URL: redis://localhost:6379
          REDIS_URL_CACHING: redis://localhost:6379
          SKIP_ENV_VALIDATION: 'true'

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          include-hidden-files: true

      - name: Upload Prisma Client
        uses: actions/upload-artifact@v4
        with:
          name: prisma-client
          path: node_modules/.prisma
          include-hidden-files: true

  cypress:
    needs: build
    runs-on: ubuntu-latest
    environment: testing
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-deps-${{ hashFiles('pnpm-lock.yaml') }}
          fail-on-cache-miss: true

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      - name: Download Prisma Client
        uses: actions/download-artifact@v4
        with:
          name: prisma-client
          path: node_modules/.prisma

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Create cypress.env.json
        env:
          CYPRESS_USER_EMAIL: ${{ secrets.CYPRESS_USER_EMAIL }}
          CYPRESS_USER_PASSWORD: ${{ secrets.CYPRESS_USER_PASSWORD }}
        run: |
          echo "{
            \"userTestEmail\": \"$CYPRESS_USER_EMAIL\",
            \"userTestPassword\": \"$CYPRESS_USER_PASSWORD\"
          }" > cypress.env.json

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: pnpm start
          wait-on: 'http://localhost:3000'
          config-file: cypress.config.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CYPRESS_USER_EMAIL: ${{ secrets.CYPRESS_USER_EMAIL }}
          CYPRESS_USER_PASSWORD: ${{ secrets.CYPRESS_USER_PASSWORD }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXT_PUBLIC_SKIP_IMAGE_VALIDATION: true
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}
          REDIS_URL: redis://localhost:6379
          REDIS_URL_CACHING: redis://localhost:6379
          SKIP_ENV_VALIDATION: 'true'
